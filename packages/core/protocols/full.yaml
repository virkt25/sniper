name: full
description: Complete project lifecycle — discovery through review
budget: 2000000  # 2M tokens

phases:
  - name: discover
    description: Research and analyze codebase to produce discovery spec
    agents:
      - analyst
    spawn_strategy: single  # One agent, no team needed
    interactive_review: true  # User reviews spec before architecture begins
    gate:
      checklist: discover
      human_approval: true
    outputs:
      - .sniper/artifacts/spec.md  # Living master doc
      - .sniper/artifacts/codebase-overview.md  # Living master doc

  - name: plan
    description: Architecture design and PRD refinement
    agents:
      - architect
      - product-manager
    spawn_strategy: team  # Multiple agents, use TeamCreate
    interactive_review: true  # User reviews architecture before story sharding
    coordination:
      - between: [architect, product-manager]
        topic: Architecture must be finalized before PRD is updated
    gate:
      checklist: plan
      human_approval: true  # Human reviews architecture before stories are created
    outputs:
      - .sniper/artifacts/{protocol_id}/plan.md
      - .sniper/artifacts/{protocol_id}/prd.md

  - name: solve
    description: Epic sharding and story creation from approved architecture
    agents:
      - product-manager
    spawn_strategy: single
    gate:
      checklist: solve
      human_approval: false
    outputs:
      - .sniper/artifacts/{protocol_id}/stories/

  - name: implement
    description: Code implementation with worktree isolation
    agents:
      - fullstack-dev
      - qa-engineer
    spawn_strategy: team
    plan_approval: true  # Each agent must get plan approved before coding
    doc_sync: true  # Run doc-writer after this phase to update living docs
    gate:
      checklist: implement
      human_approval: false
    outputs:
      - source code changes
      - test files

  - name: review
    description: Code review and final quality gate
    agents:
      - code-reviewer
    spawn_strategy: single
    gate:
      # Uses multi-faceted-review checklist when review.multi_model is enabled in config;
      # otherwise falls back to standard review checklist
      checklist: review
      multi_model_checklist: multi-faceted-review
      human_approval: true  # Human final sign-off
    outputs:
      - .sniper/artifacts/{protocol_id}/review-report.md

  - name: retro
    description: Retrospective — extract learnings, update velocity, check learning effectiveness
    agents:
      - retro-analyst
    spawn_strategy: single
    gate:
      checklist: retro
      human_approval: false
    outputs:
      - .sniper/retros/{protocol_id}.yaml
      - .sniper/memory/velocity.yaml
      - .sniper/memory/learnings/

  - name: curate
    description: Review and consolidate learnings (skipped if not needed)
    agents:
      - memory-curator
    spawn_strategy: single
    skip_if: learning_count < 30 AND last_curation_within_5_protocols
    gate:
      checklist: none
      human_approval: false
