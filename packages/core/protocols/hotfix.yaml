name: hotfix
description: Critical fix — fastest path to production

phases:
  - name: implement
    description: Emergency fix with minimal overhead
    agents:
      - fullstack-dev
    spawn_strategy: single
    plan_approval: false
    gate:
      checklist: implement
      blocking: false
    outputs:
      - source code changes
      - test files

auto_retro: false  # Hotfixes are too urgent for retros
