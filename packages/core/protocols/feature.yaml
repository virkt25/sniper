name: feature
description: Incremental feature — plan, implement, review
budget: 800000  # 800K tokens

phases:
  - name: plan
    description: Feature design and architecture
    agents:
      - architect
      - product-manager
    spawn_strategy: sequential  # Architect designs first, PM refines PRD from that
    interactive_review: true  # User reviews architecture before story sharding
    gate:
      checklist: plan
      human_approval: true
    outputs:
      - .sniper/artifacts/{protocol_id}/plan.md
      - .sniper/artifacts/{protocol_id}/prd.md

  - name: solve
    description: Story creation from approved architecture
    agents:
      - product-manager
    spawn_strategy: single
    gate:
      checklist: solve
      human_approval: false
    outputs:
      - .sniper/artifacts/{protocol_id}/stories/

  - name: implement
    description: Feature implementation
    agents:
      - fullstack-dev
      - qa-engineer
    spawn_strategy: parallel  # Multiple subagents via Task, not full TeamCreate
    plan_approval: true
    doc_sync: true  # Run doc-writer after this phase to update living docs
    gate:
      checklist: implement
      human_approval: false
    outputs:
      - source code changes
      - test files

  - name: review
    description: Code review
    agents:
      - code-reviewer
    spawn_strategy: single
    gate:
      checklist: review
      human_approval: true
    outputs:
      - .sniper/artifacts/{protocol_id}/review-report.md

auto_retro: true
