name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Check for changesets
        id: check
        run: |
          # config.json is always present, check for actual changeset md files
          count=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.check.outputs.has_changesets == 'true'
        run: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bumps
        if: steps.check.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version packages"
          git push

      - name: Publish to npm
        run: |
          # Publish each public package that has an unpublished version
          for pkg in packages/core packages/cli packages/plugins/plugin-typescript packages/plugins/plugin-python packages/plugins/plugin-go; do
            NAME=$(node -p "require('./$pkg/package.json').name")
            VERSION=$(node -p "require('./$pkg/package.json').version")
            # Check if this version is already published
            if npm view "$NAME@$VERSION" version 2>/dev/null; then
              echo "$NAME@$VERSION already published, skipping"
            else
              echo "Publishing $NAME@$VERSION"
              cd "$pkg"
              npm publish --provenance --access public
              cd "$GITHUB_WORKSPACE"
            fi
          done
